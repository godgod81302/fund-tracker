name: Scheduled Fund Scraping

on:
  schedule:
    # 每10分鐘執行一次（GitHub Actions 最小間隔是 5 分鐘）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Trigger Scraping
        run: |
          echo "觸發基金數據抓取 - $(date)"
          
          # 異步觸發，不等待完成（Worker 處理需要 3-4 分鐘）
          http_code=$(curl -X GET \
            "https://fund-tracker-api.aqexwu0817.workers.dev/api/scrape" \
            -H "User-Agent: GitHub-Actions" \
            -o /dev/null \
            -s \
            -w "%{http_code}" \
            --max-time 10)
          
          echo "HTTP Status: $http_code"
          
          if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 000 ]; then
            echo "✅ 已觸發抓取任務（Worker 將在背景處理）"
          else
            echo "⚠️ 觸發失敗 (HTTP $http_code)"
            exit 1
          fi
      
      - name: Check Progress
        if: success()
        run: |
          echo "檢查整體進度..."
          
          progress=$(curl -s "https://fund-tracker-api.aqexwu0817.workers.dev/api/funds" | \
            jq -r '.data | length')
          
          echo "📊 當前基金總數: $progress/588"
          echo "📈 完成度: $((progress * 100 / 588))%"
