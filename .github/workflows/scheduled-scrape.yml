name: Scheduled Fund Scraping

on:
  schedule:
    # 每10分鐘執行一次（GitHub Actions 最小間隔是 5 分鐘）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Trigger Scraping
        run: |
          echo "觸發基金數據抓取 - $(date)"
          
          response=$(curl -X GET \
            "https://fund-tracker-api.aqexwu0817.workers.dev/api/scrape" \
            -H "User-Agent: GitHub-Actions" \
            -w "\nHTTP_CODE:%{http_code}" \
            -s \
            --max-time 120)
          
          http_code=$(echo "$response" | grep "HTTP_CODE" | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_CODE/d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -eq 200 ]; then
            echo "✅ 抓取成功"
            echo "$body" | jq '.' || echo "$body"
          else
            echo "⚠️ 抓取失敗 (HTTP $http_code)"
            exit 1
          fi
      
      - name: Check Progress
        if: success()
        run: |
          echo "檢查整體進度..."
          
          progress=$(curl -s "https://fund-tracker-api.aqexwu0817.workers.dev/api/funds" | \
            jq -r '.data | length')
          
          echo "📊 當前基金總數: $progress/588"
          echo "📈 完成度: $((progress * 100 / 588))%"
